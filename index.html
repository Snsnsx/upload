<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Code 128 Generator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Chakra+Petch:wght@300;400;600&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #00e5ff;
    --accent2: #ff2d78;
    --text: #e0e0f0;
    --muted: #555570;
    --bar-color: #f0f0ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Chakra Petch', sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 39px, #1a1a2a 39px, #1a1a2a 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, #1a1a2a 39px, #1a1a2a 40px);
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  .glow-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(60px);
    pointer-events: none;
    z-index: 0;
  }
  .orb1 { width: 300px; height: 300px; background: rgba(0,229,255,0.04); top: -80px; left: -80px; }
  .orb2 { width: 220px; height: 220px; background: rgba(255,45,120,0.04); bottom: -60px; right: -60px; }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 640px;
    margin: 0 auto;
    padding: 24px 16px 32px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  @media (min-width: 500px) {
    .container { padding: 40px 24px 48px; }
  }

  .header {
    margin-bottom: 28px;
  }

  @media (min-width: 500px) {
    .header { margin-bottom: 40px; }
  }

  .label-tag {
    display: inline-block;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--accent);
    background: rgba(0,229,255,0.06);
    border: 1px solid rgba(0,229,255,0.2);
    padding: 3px 8px;
    margin-bottom: 10px;
  }

  h1 {
    font-size: clamp(26px, 8vw, 42px);
    font-weight: 600;
    letter-spacing: 0.04em;
    line-height: 1;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    margin-top: 6px;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--muted);
    font-weight: 300;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 20px 16px;
    position: relative;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  @media (min-width: 500px) {
    .card { padding: 32px; }
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.6;
  }

  .corner {
    position: absolute;
    width: 10px; height: 10px;
    border-color: var(--accent);
    border-style: solid;
    opacity: 0.5;
  }
  .corner.tl { top: 6px; left: 6px; border-width: 1px 0 0 1px; }
  .corner.tr { top: 6px; right: 6px; border-width: 1px 1px 0 0; }
  .corner.bl { bottom: 6px; left: 6px; border-width: 0 0 1px 1px; }
  .corner.br { bottom: 6px; right: 6px; border-width: 0 1px 1px 0; }

  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }

  .text-input {
    flex: 1;
    min-width: 0;
    background: #0d0d15;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    padding: 14px 12px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
    border-radius: 0;
    min-height: 48px;
  }

  .text-input:focus {
    border-color: rgba(0,229,255,0.4);
  }

  .text-input::placeholder {
    color: var(--muted);
    font-size: 12px;
  }

  .btn {
    font-family: 'Chakra Petch', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    padding: 14px 14px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    white-space: nowrap;
    min-height: 48px;
    min-width: 48px;
    border-radius: 0;
    -webkit-appearance: none;
    touch-action: manipulation;
  }

  .btn-primary {
    background: var(--accent);
    color: #000;
  }

  .btn-primary:active {
    background: #33ecff;
    transform: scale(0.96);
  }

  .btn-secondary {
    background: transparent;
    color: var(--accent);
    border: 1px solid rgba(0,229,255,0.3);
  }

  .btn-secondary:active {
    background: rgba(0,229,255,0.08);
  }

  .btn-danger {
    background: transparent;
    color: var(--accent2);
    border: 1px solid rgba(255,45,120,0.3);
    padding: 10px 16px;
    font-size: 11px;
    min-height: 40px;
    touch-action: manipulation;
  }

  .btn-danger:active {
    background: rgba(255,45,120,0.08);
    transform: scale(0.97);
  }

  .barcode-area {
    min-height: 100px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #ffffff;
    border: 1px solid var(--border);
    padding: 20px 12px 12px;
    position: relative;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.3s, transform 0.3s;
    overflow: hidden;
    flex: 1;
  }

  .barcode-area.visible {
    opacity: 1;
    transform: translateY(0);
  }

  canvas {
    display: block;
    image-rendering: pixelated;
    max-width: 100%;
    height: auto !important;
  }

  .barcode-text {
    margin-top: 8px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: #666;
    text-align: center;
    word-break: break-all;
    padding: 0 4px;
  }

  .status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 14px;
    min-height: 24px;
    flex-wrap: wrap;
    gap: 8px;
  }

  .status-msg {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: opacity 0.3s;
  }

  .status-msg.ok  { color: var(--accent); }
  .status-msg.err { color: var(--accent2); }
  .status-msg.idle { color: var(--muted); }

  .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: currentColor;
    animation: pulse 1.4s infinite;
    flex-shrink: 0;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .download-row {
    margin-top: 10px;
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .download-row.visible { opacity: 1; }
</style>
</head>
<body>

<div class="glow-orb orb1"></div>
<div class="glow-orb orb2"></div>

<div class="container">
  <div class="header">
    <div class="label-tag">BARCODE ENGINE v2.0</div>
    <h1>CODE <span>128A</span></h1>
    <div class="subtitle">CLIPBOARD → BARCODE GENERATOR</div>
  </div>

  <div class="card">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <div class="input-row">
      <input class="text-input" id="inputText" placeholder="вставьте текст…" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
      <button class="btn btn-primary" id="pasteBtn" title="Вставить из буфера">⌘V</button>
      <button class="btn btn-secondary" id="genBtn">GEN</button>
    </div>

    <div class="barcode-area" id="barcodeArea">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <canvas id="barcodeCanvas"></canvas>
      <div class="barcode-text" id="barcodeLabel"></div>
    </div>

    <div class="download-row" id="downloadRow">
      <button class="btn btn-danger" id="downloadBtn">↓ PNG</button>
    </div>

    <div class="status-bar">
      <div class="status-msg idle" id="statusMsg">
        <span class="dot"></span>
        <span id="statusText">ОЖИДАНИЕ ВВОДА</span>
      </div>
    </div>
  </div>
</div>

<script>
const C128 = (() => {
  const PATTERNS = [
    "212222","222122","222221","121223","121322","131222","122213","122312","132212","221213",
    "221312","231212","112232","122132","122231","113222","123122","123221","223211","221132",
    "221231","213212","223112","312131","311222","321122","321221","312212","322112","322211",
    "212123","212321","232121","111323","131123","131321","112313","132113","132311","211313",
    "231113","231311","112133","112331","132131","113123","113321","133121","313121","211331",
    "231131","213113","213311","213131","311123","311321","331121","312113","312311","332111",
    "314111","221411","431111","111224","111422","121124","121421","141122","141221","112214",
    "112412","122114","122411","142112","142211","241211","221114","413111","241112","134111",
    "111242","121142","121241","114212","124112","124211","411212","421112","421211","212141",
    "214121","412121","111143","111341","131141","114113","114311","411113","411311","113141",
    "114131","311141","411131","211412","211214","211232","2331112"
  ];
  const START_A = 103, STOP = 106;

  function charToA(ch) {
    const c = ch.charCodeAt(0);
    if (c >= 32 && c <= 95) return c - 32;
    if (c >= 0  && c <= 31) return c + 64;
    return null;
  }

  function encode(text) {
    if (!text || text.length === 0) throw new Error("Пустая строка");
    for (let i = 0; i < text.length; i++) {
      if (charToA(text[i]) === null)
        throw new Error(`Символ вне Code 128A: "${text[i]}" (0x${text.charCodeAt(i).toString(16).toUpperCase()})`);
    }
    const codes = [START_A];
    let checksum = START_A;
    for (let i = 0; i < text.length; i++) {
      const val = charToA(text[i]);
      codes.push(val);
      checksum += val * (i + 1);
    }
    codes.push(checksum % 103);
    codes.push(STOP);
    return codes;
  }

  function getPattern(code) {
    const p = PATTERNS[code];
    if (!p) throw new Error("Неизвестный код: " + code);
    return p;
  }

  return { encode, getPattern };
})();

function renderBarcode(text, canvas) {
  const codes = C128.encode(text);
  const modules = [];
  for (const code of codes) {
    const p = C128.getPattern(code);
    for (let i = 0; i < p.length; i++) {
      modules.push({ width: parseInt(p[i]), bar: i % 2 === 0 });
    }
  }

  const dpr = Math.min(window.devicePixelRatio || 1, 3);
  const unitPx = 2;
  const height = 72;
  const quietZone = 8 * unitPx;
  const totalWidth = modules.reduce((s, m) => s + m.width * unitPx, 0) + quietZone * 2;

  canvas.width  = totalWidth * dpr;
  canvas.height = (height + 1) * dpr;
  canvas.style.width  = totalWidth + 'px';
  canvas.style.height = (height + 1) + 'px';

  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, totalWidth, height + 1);

  let x = quietZone;
  for (const m of modules) {
    const w = m.width * unitPx;
    if (m.bar) {
      ctx.fillStyle = '#0a0a12';
      ctx.fillRect(x, 0, w, height);
    }
    x += w;
  }
}

const inputEl     = document.getElementById('inputText');
const pasteBtn    = document.getElementById('pasteBtn');
const genBtn      = document.getElementById('genBtn');
const barcodeArea = document.getElementById('barcodeArea');
const canvas      = document.getElementById('barcodeCanvas');
const barcodeLabel = document.getElementById('barcodeLabel');
const statusMsg   = document.getElementById('statusMsg');
const statusText  = document.getElementById('statusText');
const downloadRow = document.getElementById('downloadRow');
const downloadBtn = document.getElementById('downloadBtn');

function setStatus(type, text) {
  statusMsg.className = 'status-msg ' + type;
  statusText.textContent = text;
}

function generate(text) {
  text = text.trim();
  if (!text) { setStatus('err', 'СТРОКА ПУСТА'); return; }
  try {
    renderBarcode(text, canvas);
    barcodeLabel.textContent = text.length > 50 ? text.slice(0, 47) + '…' : text;
    barcodeArea.classList.add('visible');
    downloadRow.classList.add('visible');
    setStatus('ok', `КОД СГЕНЕРИРОВАН · ${text.length} СИМ.`);
  } catch(e) {
    setStatus('err', e.message.toUpperCase());
    barcodeArea.classList.remove('visible');
    downloadRow.classList.remove('visible');
  }
}

pasteBtn.addEventListener('click', async () => {
  try {
    const text = await navigator.clipboard.readText();
    inputEl.value = text;
    generate(text);
    setStatus('ok', `БУФЕР СЧИТАН · ${text.length} СИМ.`);
  } catch(e) {
    setStatus('err', 'НЕТ ДОСТУПА К БУФЕРУ — ВСТАВЬТЕ ВРУЧНУЮ');
  }
});

genBtn.addEventListener('click', () => generate(inputEl.value));
inputEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') generate(inputEl.value); });
inputEl.addEventListener('paste', () => setTimeout(() => generate(inputEl.value), 10));

downloadBtn.addEventListener('click', () => {
  const link = document.createElement('a');
  link.download = 'barcode_code128.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
});
</script>
</body>
</html>
