- { box-sizing: border-box; margin: 0; padding: 0; }

body {

align-items: center;
justify-content: center;
overflow: hidden;

body::before {
content: ‘’;

repeating-linear-gradient(0deg, transparent, transparent 39px, #1a1a2a 39px, #1a1a2a 40px),

.container {

}

.subtitle {

.card {

}

.card::before {

.input-row {

}

.text-input {

color: var(–text);

outline: none;

.text-input:focus {

}

.text-input::placeholder {

.btn {

letter-spacing: 0.15em;

transition: all 0.15s;

}

.btn-primary {

}

.btn-primary:hover {

}

.btn-primary:active {
transform: scale(0.97);
}

.btn-secondary {
background: transparent;
color: var(–accent);
border: 1px solid rgba(0,229,255,0.3);
}

.btn-secondary:hover {
background: rgba(0,229,255,0.05);
border-color: rgba(0,229,255,0.6);
}

.btn-danger {
background: transparent;
color: var(–accent2);
border: 1px solid rgba(255,45,120,0.3);
padding: 6px 14px;
font-size: 10px;
}

.btn-danger:hover {
background: rgba(255,45,120,0.05);
border-color: rgba(255,45,120,0.6);
}

.barcode-area {
min-height: 120px;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
background: #0d0d15;
border: 1px solid var(–border);
padding: 24px 20px 16px;
position: relative;
opacity: 0;
transform: translateY(8px);
transition: opacity 0.3s, transform 0.3s;
}

.barcode-area.visible {
opacity: 1;
transform: translateY(0);
}

canvas {
display: block;
image-rendering: pixelated;
max-width: 100%;
}

.barcode-text {
margin-top: 10px;
font-family: ‘Share Tech Mono’, monospace;
font-size: 11px;
letter-spacing: 0.15em;
color: var(–muted);
text-align: center;
word-break: break-all;
}

.status-bar {
display: flex;
align-items: center;
justify-content: space-between;
margin-top: 16px;
min-height: 24px;
}

.status-msg {
font-family: ‘Share Tech Mono’, monospace;
font-size: 11px;
letter-spacing: 0.08em;
display: flex;
align-items: center;
gap: 8px;
transition: opacity 0.3s;
}

.status-msg.ok { color: var(–accent); }
.status-msg.err { color: var(–accent2); }
.status-msg.idle { color: var(–muted); }

.dot {
width: 6px; height: 6px;
border-radius: 50%;
background: currentColor;
animation: pulse 1.4s infinite;
}

@keyframes pulse {
0%, 100% { opacity: 1; }
50% { opacity: 0.3; }
}

.corner {
position: absolute;
width: 10px; height: 10px;
border-color: var(–accent);
border-style: solid;
opacity: 0.5;
}
.corner.tl { top: 6px; left: 6px; border-width: 1px 0 0 1px; }
.corner.tr { top: 6px; right: 6px; border-width: 1px 1px 0 0; }
.corner.bl { bottom: 6px; left: 6px; border-width: 0 0 1px 1px; }
.corner.br { bottom: 6px; right: 6px; border-width: 0 1px 1px 0; }

.download-row {
margin-top: 12px;
display: flex;
justify-content: flex-end;
gap: 8px;
opacity: 0;
transition: opacity 0.3s;
}
.download-row.visible { opacity: 1; }
</style>

</head>

<script>
// ── Code 128 encoder ──────────────────────────────────────────────────────────

const C128 = (() => {
  // Each symbol: [bar widths as string "nnnnn" where n=1..4 bar width]
  // Using standard Code 128 encoding table (start B, values 0-106 + stop)
  // Patterns: 6 elements (3 bars, 3 spaces) as widths
  const PATTERNS = [
    "212222","222122","222221","121223","121322","131222","122213","122312","132212","221213",
    "221312","231212","112232","122132","122231","113222","123122","123221","223211","221132",
    "221231","213212","223112","312131","311222","321122","321221","312212","322112","322211",
    "212123","212321","232121","111323","131123","131321","112313","132113","132311","211313",
    "231113","231311","112133","112331","132131","113123","113321","133121","313121","211331",
    "231131","213113","213311","213131","311123","311321","331121","312113","312311","332111",
    "314111","221411","431111","111224","111422","121124","121421","141122","141221","112214",
    "112412","122114","122411","142112","142211","241211","221114","413111","241112","134111",
    "111242","121142","121241","114212","124112","124211","411212","421112","421211","212141",
    "214121","412121","111143","111341","131141","114113","114311","411113","411311","113141",
    "114131","311141","411131","b1a4a2","211412","211214","211232","2331112"
  ];

  const START_B = 104;
  const STOP    = 106;

  function encode(text) {
    if (!text || text.length === 0) throw new Error("Пустая строка");
    // Check all chars are in Code 128B range (32–126)
    for (let i = 0; i < text.length; i++) {
      const c = text.charCodeAt(i);
      if (c < 32 || c > 126) throw new Error(`Символ вне диапазона Code 128: "${text[i]}" (0x${c.toString(16)})`);
    }

    const codes = [];
    codes.push(START_B); // Start B

    let checksum = START_B;
    for (let i = 0; i < text.length; i++) {
      const val = text.charCodeAt(i) - 32; // Code 128B: char 32 = value 0
      codes.push(val);
      checksum += val * (i + 1);
    }
    codes.push(checksum % 103); // Check symbol
    codes.push(STOP);

    return codes;
  }

  function getPattern(code) {
    const p = PATTERNS[code];
    if (!p) throw new Error("Неизвестный код: " + code);
    return p;
  }

  return { encode, getPattern };
})();

// ── Renderer ──────────────────────────────────────────────────────────────────

function renderBarcode(text, canvas) {
  const codes = C128.encode(text);

  // Build bar/space sequence
  // Pattern string: digits = bar widths alternating bar/space starting with bar
  const modules = [];
  for (const code of codes) {
    const p = C128.getPattern(code);
    for (let i = 0; i < p.length; i++) {
      const w = parseInt(p[i]);
      modules.push({ width: w, bar: i % 2 === 0 });
    }
  }
  // Add termination bar (2 units) for stop pattern (already in last pattern as last element)
  // Stop pattern ends with a 2-unit bar — covered by pattern "2331112"

  const unitPx = 3;
  const height = 80;
  const quietZone = 10 * unitPx;

  const totalWidth = modules.reduce((s, m) => s + m.width * unitPx, 0) + quietZone * 2;

  canvas.width  = totalWidth;
  canvas.height = height + 1;

  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Background
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--bar-color').trim() || '#f0f0ff';

  // Draw bars
  let x = quietZone;
  for (const m of modules) {
    const w = m.width * unitPx;
    if (m.bar) {
      ctx.fillStyle = '#0a0a12';
      ctx.fillRect(x, 0, w, height);
    }
    x += w;
  }

  canvas.style.height = Math.min(height + 1, 100) + 'px';
}

// ── UI ────────────────────────────────────────────────────────────────────────

const inputEl    = document.getElementById('inputText');
const pasteBtn   = document.getElementById('pasteBtn');
const genBtn     = document.getElementById('genBtn');
const barcodeArea = document.getElementById('barcodeArea');
const canvas     = document.getElementById('barcodeCanvas');
const barcodeLabel = document.getElementById('barcodeLabel');
const statusMsg  = document.getElementById('statusMsg');
const statusText = document.getElementById('statusText');
const downloadRow = document.getElementById('downloadRow');
const downloadBtn = document.getElementById('downloadBtn');

function setStatus(type, text) {
  statusMsg.className = 'status-msg ' + type;
  statusText.textContent = text;
}

function generate(text) {
  text = text.trim();
  if (!text) {
    setStatus('err', 'СТРОКА ПУСТА');
    return;
  }
  try {
    renderBarcode(text, canvas);
    barcodeLabel.textContent = text.length > 60 ? text.slice(0, 57) + '…' : text;
    barcodeArea.classList.add('visible');
    downloadRow.classList.add('visible');
    setStatus('ok', `КОД СГЕНЕРИРОВАН · ${text.length} СИМ.`);
  } catch(e) {
    setStatus('err', e.message.toUpperCase());
    barcodeArea.classList.remove('visible');
    downloadRow.classList.remove('visible');
  }
}

pasteBtn.addEventListener('click', async () => {
  try {
    const text = await navigator.clipboard.readText();
    inputEl.value = text;
    generate(text);
    setStatus('ok', `БУФЕР СЧИТАН · ${text.length} СИМ.`);
  } catch(e) {
    setStatus('err', 'НЕТ ДОСТУПА К БУФЕРУ — ВСТАВЬТЕ ВРУЧНУЮ');
  }
});

genBtn.addEventListener('click', () => {
  generate(inputEl.value);
});

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') generate(inputEl.value);
});

downloadBtn.addEventListener('click', () => {
  const link = document.createElement('a');
  link.download = 'barcode_code128.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
});

// Auto-generate on paste into input
inputEl.addEventListener('paste', (e) => {
  setTimeout(() => generate(inputEl.value), 10);
});
</script>
